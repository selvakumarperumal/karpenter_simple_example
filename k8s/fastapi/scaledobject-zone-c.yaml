# ScaledObject Zone AP-SOUTH-1C
#
# KEDA reads the Prometheus query every 30s and drives the HPA for
# fastapi-app-zone-c (pods locked to ap-south-1c).
#
# SCALING FORMULA:
#   desired_replicas = ceil( query_result / threshold )
#   e.g. 47 req/s in ap-south-1c / threshold 10 = ceil(4.7) = 5 pods
#
# QUERY FILTERS TO AP-SOUTH-1C ONLY:
#   zone="ap-south-1c" — set by PodMonitor relabeling from pod label.
#   namespace="fastapi" — scopes to this app only (avoids collisions).
#   This means ScaledObject-A only reacts to traffic hitting ap-south-1c pods.
#   Zones scale independently: a spike in ap-south-1c does not scale zone-b or zone-c.
#
# NO AWS CREDENTIALS NEEDED:
#   Prometheus is in-cluster HTTP. KEDA queries it directly — no IAM, no IRSA.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fastapi-app-zone-c
  namespace: fastapi
spec:
  scaleTargetRef:
    name: fastapi-app-zone-c    # targets ONLY the zone-c Deployment

  minReplicaCount: 1     # always keep 1 pod per zone (zone stays warm, no cold start)
  maxReplicaCount: 10    # cap at 10 pods per zone
  pollingInterval: 30    # KEDA polls Prometheus every 30 seconds
  cooldownPeriod: 120    # wait 2 minutes of low traffic before scaling down

  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        # kube-prometheus-stack service: <release-name>-kube-prometheus-prometheus
        # ArgoCD app name = Helm release name = "prometheus"

        query: sum(rate(http_requests_total{namespace="fastapi",zone="ap-south-1c"}[1m]))
        # Breakdown:
        #   http_requests_total   — metric from prometheus-fastapi-instrumentator
        #   namespace="fastapi"   — scoped to this app only
        #   zone="ap-south-1c"           — only requests served by pods in ap-south-1c
        #   rate(...[1m])         — per-second rate over last 1 minute (smoothed)
        #   sum(...)              — total req/s across all pods in ap-south-1c

        threshold: "10"
        # 1 pod handles 10 req/s. Tune to your app's actual capacity.
        # Too low  → unnecessary scale-up and cost
        # Too high → pods saturate before KEDA adds more

        activationThreshold: "1"
        # Ignore noise (health checks, 0.x req/s) — only scale when > 1 req/s
        # Prevents unnecessary scale-up from monitoring probes

        metricName: http_rps_zone_c
        # MUST be unique per ScaledObject. KEDA registers this as an HPA metric name.
        # If two ScaledObjects use the same metricName, the HPA gets confused.

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          policies:
            - type: Pods
              value: 1          # remove at most 1 pod per 60s window (gentle scale-down)
              periodSeconds: 60
        scaleUp:
          policies:
            - type: Pods
              value: 3          # add up to 3 pods per 30s window (fast response to spikes)
              periodSeconds: 30
