# Aggregate Service — routes to pods in ALL zones.
#
# trafficDistribution: PreferClose (Kubernetes 1.30+)
#   When an nginx-ingress pod in ap-south-1a routes a request through this Service,
#   Kubernetes prefers endpoints in ap-south-1a (zone-a pods). If all zone-a pods
#   are unhealthy or overloaded, it falls back to pods in other zones.
#   This achieves zone-affinity without needing 3 separate Services or an ALB.
#
# SELECTOR: app: fastapi-app (matches ALL zone pods — zone label NOT included here)
#   Zone isolation is enforced at the Deployment/nodeAffinity level, not here.
#   This Service is used only for ingress → pod routing.
apiVersion: v1
kind: Service
metadata:
  name: fastapi-app
  namespace: fastapi
  labels:
    app: fastapi-app
spec:
  type: ClusterIP
  selector:
    app: fastapi-app    # matches pods from all 3 zone deployments
  ports:
    - name: http
      port: 80
      targetPort: 8000
  # trafficDistribution: PreferClose removed — Istio DestinationRule handles
  # locality-aware routing at the Envoy level (istio-destinationrule.yaml).
  # Istio's approach is more precise: it includes retries, circuit breaking,
  # and outlier detection in addition to zone preference.
