# PodMonitor Zone AP-SOUTH-1A
#
# WHY PodMonitor (not ServiceMonitor):
#   ServiceMonitor scrapes via a Service, which load-balances across all matching
#   pods and loses the per-pod zone label. PodMonitor scrapes each pod directly,
#   preserving the pod's "zone" label so the KEDA query can filter by zone.
#
# RELABELING:
#   The pod label "zone: ap-south-1a" is copied into every Prometheus time series as
#   the label "zone". This lets the KEDA ScaledObject query filter:
#     http_requests_total{zone="ap-south-1a"}
#
# NAMESPACE:
#   PodMonitor lives in "monitoring" (where Prometheus Operator is installed).
#   namespaceSelector tells Prometheus: scrape pods in the "fastapi" namespace.
#
# PROMETHEUS SELECTOR:
#   The label "release: prometheus" must match the Prometheus Operator's
#   podMonitorSelector. kube-prometheus-stack default: {release: <release-name>}.
#   Our ArgoCD app name (= Helm release name) is "prometheus".
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: fastapi-zone-a
  namespace: monitoring
  labels:
    release: prometheus    # must match Prometheus Operator podMonitorSelector
spec:
  namespaceSelector:
    matchNames:
      - fastapi            # scrape pods in the fastapi namespace
  selector:
    matchLabels:
      app: fastapi-app
      zone: ap-south-1a           # only pods locked to ap-south-1a
  podMetricsEndpoints:
    - port: http           # named port "http" = containerPort 8000 in deployment
      path: /metrics       # prometheus-fastapi-instrumentator exposes metrics here
      interval: 15s        # scrape every 15 seconds
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_zone]
          targetLabel: zone
          # Copies the pod label "zone: ap-south-1a" into every scraped metric.
          # Without this, KEDA query sum(rate(...{zone="ap-south-1a"})) returns nothing.
