# Kubernetes Gateway API — HTTPRoute
#
# REPLACES: networking.istio.io/v1 VirtualService (legacy Istio API)
#
# WHAT THIS DOES:
#   Defines HTTP routing rules and attaches them to the fastapi-gateway Gateway.
#   Istio's auto-provisioned Envoy pod is programmed with these rules.
#
# RETRIES (Istio extension):
#   Standard Gateway API HTTPRoute does not have a retry field in v1.
#   Istio reads the annotation below and programs the retry policy into Envoy:
#     networking.istio.io/retry-on, retry-attempts, per-try-timeout
#   This is Istio-specific but keeps the routing in one file.
#
# TIMEOUT:
#   The filter type: ResponseHeaderModifier cannot set timeouts.
#   Timeout is set via the ExtensionRef or Istio annotation. We use the
#   Istio annotation approach (no additional CRD needed):
#     networking.istio.io/request-timeout: "30s"
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fastapi-app
  namespace: fastapi
  annotations:
    # Istio-specific retry policy (standard HTTPRoute has no retry field in v1)
    networking.istio.io/retry-attempts: "3"
    networking.istio.io/retry-on: "connect-failure,refused-stream,5xx"
    networking.istio.io/per-try-timeout: "10s"
    networking.istio.io/request-timeout: "30s"
spec:
  parentRefs:
    - name: fastapi-gateway     # attaches to the Gateway above (same namespace)
      namespace: fastapi
      sectionName: http         # matches listener name: http (port 80)

  hostnames:
    - "fastapi.example.com"     # replace with your domain
    # For testing: remove hostnames entirely to match all hosts

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /             # match all paths: /, /health, /metrics, /docs, etc.
      backendRefs:
        - name: fastapi-app      # Kubernetes Service: fastapi-app.fastapi.svc.cluster.local
          port: 80               # Service port (maps to pod port 8000 via targetPort)
