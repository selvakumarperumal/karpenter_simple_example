apiVersion: v1
kind: Service
metadata:
  name: fastapi-app
  namespace: fastapi
  labels:
    app: fastapi-app
  annotations:
    kubernetes.io/description: "Aggregates zone-affinity FastAPI pods under a single logical IP for internal cluster routing"
spec:
  type: ClusterIP
  selector:
    app: fastapi-app
  ports:
    - name: http
      port: 80
      targetPort: 8000
