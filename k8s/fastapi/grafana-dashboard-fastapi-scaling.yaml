# ── Grafana Dashboard: FastAPI Autoscaling & Infrastructure ──────────────────
#
# PURPOSE:
#   Visualises the autoscaling pipeline: KEDA decisions, HPA replica counts,
#   pod resource usage, and Karpenter node provisioning. Helps answer:
#     "Why did my app scale up/down?" and "Are pods healthy?"
#
# HOW IT WORKS:
#   Same sidecar pattern as the overview dashboard — ConfigMap with label
#   grafana_dashboard: "1" is auto-discovered by Grafana.
#
# METRICS USED:
#   • kube_deployment_spec_replicas / status_ready_replicas  (kube-state-metrics)
#   • container_cpu_usage_seconds_total                       (cAdvisor / kubelet)
#   • container_memory_working_set_bytes                      (cAdvisor / kubelet)
#   • kube_pod_container_status_restarts_total                (kube-state-metrics)
#   • kube_horizontalpodautoscaler_status_*                   (kube-state-metrics)
#   • kube_node_labels                                        (kube-state-metrics)
#   • keda_scaler_metrics_value (if KEDA metrics are exposed) (KEDA operator)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-fastapi-scaling
  namespace: fastapi
  labels:
    grafana_dashboard: "1"       # Grafana sidecar auto-discovers this ConfigMap
  annotations:
    grafana_folder: "FastAPI"    # Groups dashboard under "FastAPI" folder in Grafana
data:
  fastapi-scaling.json: |
    {
      "annotations": { "list": [] },
      "description": "FastAPI autoscaling pipeline — KEDA, HPA, replica counts, pod resources, Karpenter nodes",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 200,
          "title": "── Replica Counts ──",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "drawStyle": "line",
                "lineInterpolation": "stepAfter"
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 1,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Desired Replicas per Zone",
          "type": "timeseries",
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"fastapi\", deployment=~\"fastapi-app-zone-.*\"}",
              "legendFormat": "{{deployment}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "drawStyle": "line",
                "lineInterpolation": "stepAfter"
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 2,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Ready vs Desired Replicas",
          "type": "timeseries",
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"fastapi\", deployment=~\"fastapi-app-zone-.*\"}",
              "legendFormat": "desired — {{deployment}}"
            },
            {
              "expr": "kube_deployment_status_ready_replicas{namespace=\"fastapi\", deployment=~\"fastapi-app-zone-.*\"}",
              "legendFormat": "ready — {{deployment}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 201,
          "title": "── HPA & KEDA ──",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "drawStyle": "line",
                "lineInterpolation": "stepAfter"
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 3,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "HPA — Desired vs Current Replicas",
          "type": "timeseries",
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"fastapi\"}",
              "legendFormat": "desired — {{horizontalpodautoscaler}}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"fastapi\"}",
              "legendFormat": "current — {{horizontalpodautoscaler}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "reqps"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 4,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "KEDA Trigger — Request Rate per Zone (what KEDA sees)",
          "description": "Same PromQL query KEDA uses in the ScaledObject. Helps debug scaling decisions.",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"fastapi\",zone=\"ap-south-1a\"}[1m]))",
              "legendFormat": "ap-south-1a"
            },
            {
              "expr": "sum(rate(http_requests_total{namespace=\"fastapi\",zone=\"ap-south-1b\"}[1m]))",
              "legendFormat": "ap-south-1b"
            },
            {
              "expr": "sum(rate(http_requests_total{namespace=\"fastapi\",zone=\"ap-south-1c\"}[1m]))",
              "legendFormat": "ap-south-1c"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 202,
          "title": "── Pod Resources ──",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 1,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "short"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 5,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"fastapi\", container=\"fastapi\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 1,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "bytes"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 19 },
          "id": 6,
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }, "tooltip": { "mode": "multi" } },
          "title": "Memory Usage (working set)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"fastapi\", container=\"fastapi\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 27 },
          "id": 7,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "CPU Usage vs Request (% of 250m request)",
          "description": "Shows how close each pod is to its CPU request (250m). Over 100% = throttling risk.",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"fastapi\", container=\"fastapi\"}[5m])) / 0.25 * 100",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 10,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" }
              },
              "unit": "percent"
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 27 },
          "id": 8,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Memory Usage vs Limit (% of 512Mi limit)",
          "description": "Shows how close each pod is to its memory limit (512Mi). Over 100% = OOMKilled.",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"fastapi\", container=\"fastapi\"}) / (512 * 1024 * 1024) * 100",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 35 },
          "id": 203,
          "title": "── Pod Health ──",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 30,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "drawStyle": "line",
                "lineInterpolation": "stepAfter"
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 36 },
          "id": 9,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Pod Restarts",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum by (pod) (kube_pod_container_status_restarts_total{namespace=\"fastapi\", container=\"fastapi\"})",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 36 },
          "id": 10,
          "options": {
            "colorMode": "background_solid",
            "graphMode": "none",
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "value_and_name"
          },
          "title": "Pods Not Ready",
          "description": "Shows pods where ready replicas < desired replicas. Non-zero = potential issue.",
          "type": "stat",
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"fastapi\", deployment=~\"fastapi-app-zone-.*\"} - kube_deployment_status_ready_replicas{namespace=\"fastapi\", deployment=~\"fastapi-app-zone-.*\"}",
              "legendFormat": "{{deployment}}"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 44 },
          "id": 204,
          "title": "── Karpenter Nodes ──",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 2,
                "spanNulls": false,
                "stacking": { "mode": "none" },
                "drawStyle": "line",
                "lineInterpolation": "stepAfter"
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 45 },
          "id": 11,
          "options": { "legend": { "displayMode": "table", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Karpenter-Managed Node Count by Zone",
          "description": "Nodes provisioned by Karpenter, grouped by availability zone.",
          "type": "timeseries",
          "targets": [
            {
              "expr": "count by (label_topology_kubernetes_io_zone) (kube_node_labels{label_karpenter_sh_nodepool!=\"\"})",
              "legendFormat": "{{label_topology_kubernetes_io_zone}}"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 1 },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "short",
              "decimals": 0
            }
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 45 },
          "id": 12,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          },
          "title": "Total Karpenter Nodes",
          "type": "stat",
          "targets": [
            {
              "expr": "count(kube_node_labels{label_karpenter_sh_nodepool!=\"\"})",
              "legendFormat": "nodes"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["fastapi", "autoscaling", "keda", "karpenter", "infrastructure"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "FastAPI — Autoscaling & Infrastructure",
      "uid": "fastapi-scaling",
      "version": 1
    }
