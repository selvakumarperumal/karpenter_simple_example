# ── FastAPI Namespace ─────────────────────────────────────────────────────────
#
# PURPOSE:
#   Creates a dedicated namespace for the FastAPI application workload.
#   Isolates the application from system components (kube-system) and
#   platform tools (argocd, monitoring, etc.).
#
# WHY A SEPARATE NAMESPACE:
#   • Resource quotas can be applied per-namespace
#   • RBAC policies can restrict access to this namespace only
#   • Network Policies can isolate traffic between namespaces
#   • Easier to identify resources belonging to this application
#
# CREATION:
#   This manifest is applied by ArgoCD (via k8s/argocd/apps/fastapi.yaml).
#   The ArgoCD Application also has CreateNamespace=true as a fallback,
#   but including this manifest ensures labels are applied correctly.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: fastapi
  labels:
    app.kubernetes.io/name: fastapi
    istio-injection: enabled
    # Istio's MutatingWebhook injects an Envoy sidecar into every new pod
    # in this namespace. The sidecar handles mTLS, locality-aware routing,
    # retries, and circuit breaking transparently.
