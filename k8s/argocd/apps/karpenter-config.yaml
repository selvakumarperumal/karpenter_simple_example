# ── Karpenter config — NodePool + EC2NodeClass ────────────────────────────────
#
# PURPOSE:
#   Applies Karpenter node configuration via Kustomize from k8s/karpenter-config/.
#   This defines HOW Karpenter provisions nodes (instance types, AMIs, IAM role).
#
# WHAT IT APPLIES (via kustomization.yaml):
#   1. EC2NodeClass — AWS-specific node config; IAM role hardcoded as
#                     "karpenter-node-role" (matches iam-karpenter.tf)
#   2. NodePool     — Karpenter scheduling rules (fully static)
#
# SYNC WAVE:
#   Wave "2" — must run AFTER:
#     • karpenter (wave 1) → Karpenter CRDs exist
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/selvakumarperumal/karpenter_simple_example.git
    targetRevision: HEAD
    path: k8s/karpenter-config
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
