# ── Karpenter Helm chart — installed by ArgoCD (sync wave 1) ──────────────────
#
# PURPOSE:
#   Installs the Karpenter controller into kube-system via its OCI Helm chart
#   from public.ecr.aws/karpenter. Karpenter watches for unschedulable pods
#   and provisions EC2 instances to run them.
#
# SYNC WAVE:
#   Wave "1" — runs AFTER external-secrets (wave 0) so ESO CRDs exist.
#   Runs BEFORE karpenter-config (wave 2) so Karpenter CRDs are present.
#   Runs in parallel with: app-secrets, keda (same wave, independent).
#
# SERVICE ACCOUNT:
#   Created by the Helm chart (serviceAccount.create=true, the default).
#   Pod Identity works by matching the namespace/name — no annotation needed.
#
# OCI CHART:
#   Karpenter is distributed as an OCI artifact, not a traditional Helm repo.
#   The OCI registry must be pre-registered in ArgoCD — done in helm-argocd.tf.
#
# VERSION:
#   1.13.0 — latest stable. Uses karpenter.sh/v1 and karpenter.k8s.aws/v1 APIs.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: oci://public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: "1.13.0"
    helm:
      parameters:
        - name: settings.clusterName
          value: karpenter-demo
        - name: settings.interruptionQueue
          value: karpenter-demo
        - name: controller.resources.requests.cpu
          value: "1"
        - name: controller.resources.requests.memory
          value: 1Gi
        - name: controller.resources.limits.cpu
          value: "1"
        - name: controller.resources.limits.memory
          value: 1Gi
        - name: serviceAccount.name
          value: karpenter
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
