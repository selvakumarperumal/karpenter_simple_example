# ── Istio Base — CRDs + cluster-wide resources (wave 0) ──────────────────────
#
# PURPOSE:
#   Installs Istio's CRDs (VirtualService, DestinationRule, Gateway, etc.)
#   and cluster-wide RBAC before istiod starts. Must be the very first Istio
#   component installed — istiod and the ingressgateway depend on these CRDs.
#
# CHART: istio/base
#   Only installs CRDs and ClusterRoles. Zero running pods.
#   Safe to upgrade independently of istiod.
#
# SYNC WAVE: 0
#   Runs alongside cert-manager and external-secrets so CRDs exist before
#   any Istio resource (Gateway, VirtualService, DestinationRule) is applied.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: "1.30.1"
    helm:
      parameters:
        # Enable validation webhook for Istio resources (recommended)
        - name: defaultRevision
          value: "default"
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
