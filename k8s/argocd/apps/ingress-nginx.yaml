# ── ingress-nginx ─────────────────────────────────────────────────────────────
#
# PURPOSE:
#   NGINX-based Ingress controller. Receives external HTTP/HTTPS traffic via
#   an AWS Network Load Balancer (NLB) and routes it to backend services
#   based on Ingress resource rules.
#
# ⚠️  EOL NOTICE:
#   The community kubernetes/ingress-nginx project reached End-of-Life in
#   March 2026. No further security patches or updates will be released.
#
#   MIGRATION OPTIONS:
#     1. F5 NGINX Ingress Controller (nginx/kubernetes-ingress) — actively
#        maintained, Helm chart: https://helm.nginx.com/stable
#     2. Kubernetes Gateway API — the future standard for ingress traffic
#        management, supported natively by many implementations
#     3. AWS Load Balancer Controller — AWS-native ALB/NLB management
#
#   This chart is pinned at the final release (4.15.1) for existing
#   deployments. Plan migration to one of the above alternatives.
#
# SYNC WAVE:
#   Wave "3" — installed after cert-manager (wave 0) and Karpenter (waves 1-2)
#   so that TLS certificates can be issued and nodes are available.
#
# AWS NLB:
#   The NLB annotation creates a Layer-4 load balancer (TCP/UDP).
#   For HTTPS termination at the load balancer level, switch to an ALB
#   using the AWS Load Balancer Controller instead.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "4.15.1"
    helm:
      parameters:
        # Use AWS Network Load Balancer (layer-4) to front NGINX
        - name: controller.service.type
          value: LoadBalancer
        # Use the modern NLB annotation (service.beta prefix is deprecated)
        - name: controller.service.annotations.service\.beta\.kubernetes\.io/aws-load-balancer-type
          value: nlb
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
