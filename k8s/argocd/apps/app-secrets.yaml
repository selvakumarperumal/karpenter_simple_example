# ── App Secrets — ClusterSecretStore + ExternalSecrets ───────────────────────
#
# PURPOSE:
#   Applies the ClusterSecretStore (ESO → AWS Secrets Manager) and all
#   application ExternalSecrets. ESO processes each ExternalSecret and
#   creates the corresponding Kubernetes Secret in the target namespace.
#
# WHAT IT APPLIES (via kustomization.yaml):
#   1. ClusterSecretStore  — "aws-secrets-manager" (cluster-scoped)
#   2. ExternalSecret      — "google-api-key" → K8s Secret in fastapi namespace
#
# SYNC WAVE:
#   Wave "1" — runs AFTER external-secrets (wave 0) so ESO CRDs and controller
#   are present. Runs BEFORE fastapi (wave 4) so Secrets exist when pods start.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/selvakumarperumal/karpenter_simple_example.git
    targetRevision: HEAD
    path: k8s/secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: fastapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
