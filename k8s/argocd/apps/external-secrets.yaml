# ── external-secrets ──────────────────────────────────────────────────────────
#
# PURPOSE:
#   Syncs secrets from external secret stores (AWS Secrets Manager, SSM
#   Parameter Store, HashiCorp Vault, etc.) into Kubernetes Secrets.
#   Applications read from K8s Secrets; ESO handles the sync lifecycle.
#
# WHY ESO IS CRITICAL IN THIS STACK:
#   The Karpenter EC2NodeClass needs the node IAM role name, which is a
#   Terraform output. ESO bridges this gap:
#     Terraform → SSM → ESO → K8s Secret → PostSync Job → EC2NodeClass
#
# SYNC WAVE:
#   Wave "0" — must be installed early because:
#     • Karpenter manifests (wave 2) include an ExternalSecret that ESO
#       must process before the PostSync Job can run
#     • ESO CRDs (ExternalSecret, ClusterSecretStore) must exist first
#
# SERVICE ACCOUNT:
#   The ServiceAccount and namespace are created by Terraform (iam-karpenter.tf)
#   so the IRSA annotation is managed alongside the IAM role in Terraform state.
#   serviceAccount.create=false tells the chart to reuse the Terraform-managed SA.
#
# VERSION:
#   0.12.1 — latest stable 0.x release. Check https://external-secrets.io/
#   for upgrade guides before bumping.
#
# CRDs:
#   installCRDs=true installs CRDs (ExternalSecret, SecretStore, etc.)
#   with the chart. Required for first-time installation.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "2.6.0"
    helm:
      parameters:
        # Install the CRDs (ExternalSecret, SecretStore, etc.) with the chart
        - name: installCRDs
          value: "true"
        # Terraform creates the SA with the IRSA annotation — do not overwrite it
        - name: serviceAccount.create
          value: "false"
        - name: serviceAccount.name
          value: "external-secrets"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Namespace already exists (Terraform created it) — no-op but harmless
      - CreateNamespace=true
