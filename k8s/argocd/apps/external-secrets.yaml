# ── External Secrets Operator — Helm chart via ArgoCD ─────────────────────────
#
# PURPOSE:
#   Installs ESO so Kubernetes ExternalSecret resources can sync values
#   from AWS Secrets Manager into Kubernetes Secrets.
#
# SYNC WAVE:
#   Wave "0" — installed early because:
#     • ESO CRDs (ExternalSecret, ClusterSecretStore) must exist before any
#       ExternalSecret resource is applied (wave 1+)
#
# SERVICE ACCOUNT:
#   The ServiceAccount and namespace are pre-created by Terraform
#   (iam-external-secrets.tf) with the IRSA annotation pointing to the ESO
#   IAM role. serviceAccount.create=false tells the chart to reuse it.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.10.7"
    helm:
      parameters:
        - name: installCRDs
          value: "true"
        - name: serviceAccount.create
          value: "false"
        - name: serviceAccount.name
          value: "external-secrets"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
