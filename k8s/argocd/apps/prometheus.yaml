# ── kube-prometheus-stack ─────────────────────────────────────────────────────
#
# PURPOSE:
#   Installs a complete monitoring stack: Prometheus (metrics collection),
#   Grafana (dashboards), and Alertmanager (alerting). Includes pre-built
#   dashboards and alerting rules for Kubernetes cluster monitoring.
#
# WHAT IT DEPLOYS:
#   • Prometheus Operator   — Manages Prometheus instances via CRDs
#   • Prometheus            — Scrapes and stores time-series metrics
#   • Grafana               — Web UI for visualising metrics dashboards
#   • Alertmanager          — Routes alerts to Slack, PagerDuty, etc.
#   • node-exporter         — Exports host-level metrics (CPU, memory, disk)
#   • kube-state-metrics    — Exports Kubernetes object state metrics
#   • Default dashboards    — Pre-built Grafana dashboards for K8s components
#   • Default alert rules   — Standard alerting rules for common issues
#
# SYNC WAVE:
#   Wave "3" — monitoring is non-critical for bootstrap; installed after
#   core infrastructure (Karpenter, ESO) is running.
#
# GRAFANA ACCESS:
#   Default credentials: admin / changeme (CHANGE IN PRODUCTION!)
#   Access via kubectl port-forward:
#     kubectl port-forward svc/prometheus-grafana -n monitoring 3000:80
#     → http://localhost:3000
#
# STORAGE:
#   Persistent storage is disabled for this demo. In production, configure
#   a PersistentVolumeClaim to retain metrics across pod restarts:
#     prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage: 50Gi
#
# VERSION:
#   72.4.0 — latest stable release. Check the GitHub releases page
#   before upgrading: https://github.com/prometheus-community/helm-charts
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "86.2.0"
    helm:
      parameters:
        # Disable persistent storage for this demo; enable in production
        - name: prometheus.prometheusSpec.storageSpec
          value: ""
        # Default Grafana admin password — use a Kubernetes Secret or ESO in production!
        - name: grafana.adminPassword
          value: "changeme"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
