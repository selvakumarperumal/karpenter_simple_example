# ── App of Apps — ArgoCD root Application ─────────────────────────────────────
#
# PURPOSE:
#   The single root Application that bootstraps the entire GitOps pipeline.
#   It points ArgoCD at k8s/argocd/apps/ where each YAML file defines a
#   child Application for a specific tool or service.
#
# HOW IT WORKS:
#   1. Terraform applies this manifest via envsubst (helm-argocd.tf)
#   2. ArgoCD reads all Application manifests in k8s/argocd/apps/
#   3. Each child Application installs its component (Helm chart or K8s manifests)
#   4. Sync waves ensure correct ordering (ESO → Karpenter → apps)
#
# ADDING NEW TOOLS:
#   To add a new tool (e.g. Istio), simply create k8s/argocd/apps/istio.yaml
#   and push to Git. ArgoCD will detect the new file and install it
#   automatically. No Terraform changes needed.
#
# ENVSUBST:
#   ${GIT_REPOSITORY_URL} is replaced at apply time by the Terraform
#   null_resource in helm-argocd.tf with the value of var.git_repository_url.
#
# SYNC POLICY:
#   • automated: ArgoCD syncs automatically when Git changes are detected
#   • prune: Resources removed from Git are deleted from the cluster
#   • selfHeal: Manual changes in the cluster are reverted to match Git
#   • retry: Exponential backoff handles transient sync failures
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${GIT_REPOSITORY_URL}
    targetRevision: HEAD
    path: k8s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
