apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      # ESO authenticates via IRSA — the "external-secrets" ServiceAccount in
      # the "external-secrets" namespace has the aws role-arn annotation.
      # No explicit auth block needed; ESO picks up credentials automatically.
