apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: google-api-key
  namespace: fastapi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: google-api-key        # K8s Secret created in the fastapi namespace
    creationPolicy: Owner       # ESO owns the Secret lifecycle
  data:
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        # Matches aws_secretsmanager_secret.google_api_key in terraform/secrets.tf
        key: karpenter-demo/GOOGLE_API_KEY
