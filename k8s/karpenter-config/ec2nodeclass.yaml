# ── EC2NodeClass ──────────────────────────────────────────────────────────────
#
# PURPOSE:
#   Defines the AWS-specific configuration for EC2 instances provisioned by
#   Karpenter. This includes the AMI family, IAM role, networking, storage,
#   and metadata tags.
#
# APPLIED BY:
#   Listed in kustomization.yaml and applied directly by ArgoCD.
#
# IAM ROLE:
#   The node IAM role name is hardcoded ("karpenter-node-role") — this matches
#   node_iam_role_name in terraform/iam-karpenter.tf.
#
# API VERSION:
#   karpenter.k8s.aws/v1 — stable since Karpenter v1.0.0 (August 2024).
#   This is the AWS-specific CRD; the provider-neutral NodePool uses
#   karpenter.sh/v1 instead.
#
# KEY FIELDS:
#   • amiFamily        — Determines OS bootstrapping logic (AL2023, AL2, Bottlerocket)
#   • amiSelectorTerms — REQUIRED in v1 API. Selects which AMI to use.
#                         Use alias for EKS-optimized AMIs (e.g. al2023@latest)
#   • role             — IAM role name for the EC2 instances (NOT the ARN)
#   • subnetSelectorTerms     — Tags to discover which subnets to launch into
#   • securityGroupSelectorTerms — Tags to discover which SGs to attach
#   • blockDeviceMappings     — EBS volume configuration for the root disk
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # Amazon Linux 2023 — the latest EKS-optimized Linux distribution.
  # Replaces AL2 with improved security defaults, SELinux, and faster boot.
  amiFamily: AL2023

  # AMI selection — REQUIRED in Karpenter v1 API.
  # "alias" auto-discovers the latest EKS-optimized AMI for this family.
  # For production, pin to a specific version (e.g. al2023@v20240807)
  # to prevent unexpected AMI changes during node replacements.
  amiSelectorTerms:
    - alias: al2023@latest

  # Hardcoded to match node_iam_role_name in terraform/iam-karpenter.tf.
  role: "karpenter-node-role"

  # Discover subnets tagged by Terraform (vpc.tf private_subnet_tags).
  # Karpenter will launch nodes into any subnet matching these tags.
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "karpenter-demo"

  # Discover security groups tagged by Terraform (eks.tf node_security_group_tags).
  # These SGs control network access for Karpenter-provisioned nodes.
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "karpenter-demo"

  # Root volume configuration for Karpenter-provisioned nodes.
  # gp3 is the recommended EBS type: better baseline IOPS than gp2, same cost.
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true

  # Tags applied to every EC2 instance Karpenter creates.
  # Useful for cost allocation, compliance, and resource identification.
  tags:
    Environment: production
    ManagedBy: Karpenter
    Cluster: "karpenter-demo"
