# ── Kustomization — Karpenter node configuration ──────────────────────────────
#
# PURPOSE:
#   Declares which Kubernetes resources in k8s/karpenter-config/ should be
#   applied by the ArgoCD "karpenter-config" Application (sync wave 2).
#
# RESOURCE ORDER:
#   1. EC2NodeClass — AWS-specific node config with hardcoded IAM role name
#   2. NodePool     — Karpenter scheduling rules (fully static)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ec2nodeclass.yaml           # EC2NodeClass — AWS-specific node config (hardcoded IAM role)
  - nodepool.yaml               # NodePool — Karpenter scheduling rules (fully static)
