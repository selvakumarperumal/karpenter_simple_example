# ── Kustomization — Karpenter node configuration ──────────────────────────────
#
# PURPOSE:
#   Declares which Kubernetes resources in k8s/karpenter-config/ should be
#   applied by the ArgoCD "karpenter-config" Application (sync wave 2).
#
# RESOURCE ORDER:
#   1. ClusterSecretStore — ESO store configuration (must exist first)
#   2. ExternalSecret     — Creates the K8s Secret from SSM
#   3. RBAC               — ServiceAccount + ClusterRole for the PostSync Job
#   4. NodePool           — Karpenter scheduling rules (fully static)
#   5. PostSync Job       — Applies EC2NodeClass with dynamic role name
#
# EXCLUDED FILES:
#   • ec2nodeclass.yaml — NOT listed here. It is a reference template only.
#     The live EC2NodeClass is created by the PostSync Job (bootstrap-job.yaml)
#     which injects the IAM role name from the karpenter-node-config Secret.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cluster-secret-store.yaml   # ClusterSecretStore → ESO reads from SSM
  - external-secret.yaml        # ExternalSecret → creates Secret karpenter-node-config
  - bootstrap-rbac.yaml         # SA + ClusterRole for the PostSync Job
  - nodepool.yaml               # NodePool — fully static, no dynamic values
  - bootstrap-job.yaml          # PostSync Job — applies EC2NodeClass with real role name
