# ── RBAC for the EC2NodeClass bootstrap Job ───────────────────────────────────
#
# PURPOSE:
#   Grants the PostSync Job (bootstrap-job.yaml) the minimum permissions
#   needed to read the karpenter-node-config Secret and apply the EC2NodeClass.
#
# RESOURCES CREATED:
#   1. ServiceAccount "karpenter-bootstrap" — used by the Job pod
#   2. ClusterRole "karpenter-bootstrap" — defines the allowed API operations
#   3. ClusterRoleBinding — binds the SA to the ClusterRole
#
# PERMISSIONS (least-privilege):
#   • Secrets:       get (read-only, scoped to "karpenter-node-config" by name)
#   • EC2NodeClass:  get, create, update, patch (full CRUD on cluster-scoped CRD)
#
# WHY CLUSTERROLE (not Role):
#   EC2NodeClass is a cluster-scoped resource (no namespace), so it requires
#   a ClusterRole. The Secret access could use a Role, but combining both
#   into one ClusterRole is simpler and equally secure since we scope the
#   Secret access using resourceNames.
#
# SECURITY NOTE:
#   The Secret read permission is restricted to a single named Secret
#   ("karpenter-node-config") via resourceNames. The Job cannot read any
#   other Secrets in the cluster.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: karpenter-bootstrap
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: karpenter-bootstrap
rules:
  # Permission to manage the EC2NodeClass CRD (cluster-scoped)
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses"]
    verbs: ["get", "create", "update", "patch"]
  # Permission to read ONLY the karpenter-node-config Secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["karpenter-node-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: karpenter-bootstrap
subjects:
  - kind: ServiceAccount
    name: karpenter-bootstrap
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: karpenter-bootstrap
  apiGroup: rbac.authorization.k8s.io
