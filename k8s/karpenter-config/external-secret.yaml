# ── ExternalSecret — Karpenter node IAM role name ────────────────────────────
#
# PURPOSE:
#   Reads the Karpenter node IAM role name from AWS SSM Parameter Store and
#   creates a Kubernetes Secret in kube-system. This bridges the gap between
#   Terraform (which creates the IAM role) and ArgoCD (which applies the
#   EC2NodeClass).
#
# DATA FLOW:
#   Terraform (iam-karpenter.tf)
#     → aws_ssm_parameter: /<cluster>/karpenter/node-role-name = "KarpenterNodeRole-xxx"
#     → This ExternalSecret reads the SSM parameter
#     → ESO creates K8s Secret "karpenter-node-config" with key "nodeRoleName"
#     → PostSync Job (bootstrap-job.yaml) reads the Secret
#     → Job applies EC2NodeClass with the real role name
#
# REFRESH INTERVAL:
#   1h — ESO polls SSM every hour for changes. In practice, the role name
#   rarely changes. If you need faster propagation, reduce this value.
#
# CREATION POLICY:
#   Owner — ESO owns the Secret lifecycle. If this ExternalSecret is deleted,
#   ESO also deletes the Kubernetes Secret. Use "Orphan" if you want the
#   Secret to persist after ExternalSecret deletion.
#
# SSM PARAMETER PATH:
#   /<cluster_name>/karpenter/node-role-name
#   Written by: aws_ssm_parameter.karpenter_node_role_name in Terraform
#   Contains:   The IAM role NAME (not ARN) for Karpenter-provisioned nodes
#
# API VERSION:
#   external-secrets.io/v1beta1 — stable and widely supported.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: karpenter-node-config
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: karpenter-node-config
    creationPolicy: Owner
  data:
    - secretKey: nodeRoleName
      remoteRef:
        # Path written by aws_ssm_parameter.karpenter_node_role_name in Terraform
        key: /karpenter-demo/karpenter/node-role-name
