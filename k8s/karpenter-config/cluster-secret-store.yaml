# ── ClusterSecretStore — AWS SSM Parameter Store ──────────────────────────────
#
# PURPOSE:
#   Configures the External Secrets Operator (ESO) to read parameters from
#   AWS SSM Parameter Store. This is a cluster-scoped store, meaning
#   ExternalSecret resources in ANY namespace can reference it.
#
# HOW IT WORKS:
#   1. ESO controller pod authenticates to AWS using its ServiceAccount
#      (annotated with IRSA by Terraform in iam-karpenter.tf)
#   2. When an ExternalSecret references this store, ESO calls
#      ssm:GetParameter to fetch the value
#   3. ESO creates/updates a Kubernetes Secret with the fetched value
#
# AUTHENTICATION:
#   The ESO controller pod runs with the "external-secrets" ServiceAccount
#   in the "external-secrets" namespace. Terraform creates this SA with an
#   IRSA annotation pointing to the ESO IAM role. ESO picks up the
#   credentials automatically — no explicit serviceAccountRef needed here.
#
# REGION:
#   Must match the region where the SSM parameters were created (var.aws_region
#   in Terraform). If you deploy to a different region, update this value.
#
# API VERSION:
#   external-secrets.io/v1beta1 — stable and widely supported. The v1 API
#   is also available in ESO v0.10+ but v1beta1 remains fully supported.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
